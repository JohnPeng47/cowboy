tests:
  - name: test_handle_system_project_create_hook_event
    coverage_added: 78
    test_module: TestGitlabEnterpriseWebhookHandler
    code: |
      def test_handle_system_project_create_hook_event(self):
          owner = OwnerFactory(service="gitlab_enterprise")
          repo = RepositoryFactory(
              author=owner,
              service_id=uuid.uuid4(),
              active=True,
          )
          owner.permission = [repo.repoid]
          owner.save()

          data = {
              "event_name": "project_create", 
              "owner_email": owner.email,
              "path_with_namespace": f"{owner.username}/sample-repo",
          }

          with patch.object(
              GitLabEnterpriseWebhookHandler, "_try_initiate_sync_for_owner"
          ) as mock_sync_owner:
              response = self._post_event_data(GitLabWebhookEvents.SYSTEM, data)
              mock_sync_owner.assert_called_once()
              assert response.status_code == status.HTTP_200_OK
              assert response.data == "Sync initiated"
