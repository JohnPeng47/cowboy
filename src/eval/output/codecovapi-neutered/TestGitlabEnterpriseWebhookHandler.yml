- name: TestGitlabEnterpriseWebhookHandler.test_handle_merge_request_event_open
  coverage_added: 31
  code: |-
    def test_handle_merge_request_event_open(self):
            repo = RepositoryFactory(
                author=OwnerFactory(service="gitlab_enterprise"),
                service_id=uuid.uuid4(),
                active=True,
            )
            pull_data = {
                "object_attributes": {
                    "action": "open",
                    "iid": 1,
                }
            }
            response = self.client.post(
                reverse("gitlab_enterprise-webhook"),
                **{
                    GitLabHTTPHeaders.EVENT: GitLabWebhookEvents.MERGE_REQUEST,
                    GitLabHTTPHeaders.TOKEN: "",
                },
                data={"project_id": repo.service_id, **pull_data},
                format="json",
            )
            assert response.status_code == status.HTTP_200_OK
            assert response.data == "Opening pull request in Codecov"
- name: TestGitlabEnterpriseWebhookHandler.test_system_hook_event_project_destroy
  coverage_added: 16
  code: |-
    def test_system_hook_event_project_destroy(self):
            repo = RepositoryFactory(
                author=OwnerFactory(service="gitlab_enterprise"),
                service_id=uuid.uuid4(),
                active=True,
            )
            response = self.client.post(
                reverse("gitlab_enterprise-webhook"),
                **{
                    GitLabHTTPHeaders.EVENT: GitLabWebhookEvents.SYSTEM,
                    GitLabHTTPHeaders.TOKEN: "",
                },
                data={
                    "project_id": repo.service_id,
                    "event_name": "project_destroy",
                },
                format="json",
            )
            assert response.status_code == status.HTTP_200_OK
            assert response.data == "Repository deleted"
