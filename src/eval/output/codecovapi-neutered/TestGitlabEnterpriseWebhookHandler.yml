repo_name: codecovapi-neutered
git_hash: 3f3d1e86f5e2a51b2f45e5955bb464346a904c59
tm_name: TestGitlabEnterpriseWebhookHandler
tests:
- name: TestGitlabEnterpriseWebhookHandler.test_handle_push_event
  coverage_added: 9
  code: |-
    def test_handle_push_event(self):
            repo = RepositoryFactory(author=OwnerFactory(service="gitlab_enterprise"))
            response = self._post_event_data(
                event=GitLabWebhookEvents.PUSH, data={"project_id": repo.service_id}
            )
            assert response.status_code == status.HTTP_200_OK
            assert response.data == "No yaml cached yet."
- name: TestGitlabEnterpriseWebhookHandler.test_handle_job_event_pending
  coverage_added: 9
  code: |-
    def test_handle_job_event_pending(self):
            repo = RepositoryFactory(author=OwnerFactory(service="gitlab_enterprise"))
            response = self._post_event_data(
                event=GitLabWebhookEvents.JOB,
                data={"project_id": repo.service_id, "build_status": "pending"},
            )
            assert response.status_code == status.HTTP_200_OK
            assert response.data == WebhookHandlerErrorMessages.SKIP_PENDING_STATUSES
- name: TestGitlabEnterpriseWebhookHandler.test_handle_merge_request_event_open
  coverage_added: 31
  code: |-
    def test_handle_merge_request_event_open(self):
            repo = RepositoryFactory(author=OwnerFactory(service="gitlab_enterprise"))
            response = self._post_event_data(
                event=GitLabWebhookEvents.MERGE_REQUEST,
                data={
                    "project_id": repo.service_id,
                    "object_attributes": {"action": "open", "iid": 1},
                },
            )
            assert response.status_code == status.HTTP_200_OK
            assert response.data == "Opening pull request in Codecov"
